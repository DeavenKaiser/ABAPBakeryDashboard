<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Shift Checklist</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B4F3A">
</head>
<body>
  <div class="wrap" id="app">
    <div class="empty">Loading…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="nav.js"></script>
  <script>
    let TASKS = [], DONE = new Set();
    const PKEY = periodKey("each_shift");

    (async () => {
      if (!(await requireLogin())) return;
      await renderTopbar("Shift Checklist");
      renderNav("shift");
      await load();
    })();

    async function load() {
      // Shared shift tasks (the generic cleaning duties anyone does)
      const { data: tasks } = await sb.from("tasks")
        .select("*")
        .eq("owner", "shared")
        .eq("frequency", "each_shift")
        .eq("active", true)
        .order("sort_order");
      TASKS = tasks || [];

      // Which are already done this shift (period)
      const ids = TASKS.map(t => t.id);
      const { data: comps } = await sb.from("task_completions")
        .select("task_id")
        .eq("period_key", PKEY)
        .in("task_id", ids.length ? ids : [-1]);
      DONE = new Set((comps || []).map(c => c.task_id));

      render();
    }

    function render() {
      const app = document.getElementById("app");
      if (!TASKS.length) { app.innerHTML = `<div class="empty">No shared shift tasks yet.</div>`; return; }

      const doneCount = TASKS.filter(t => DONE.has(t.id)).length;
      const pct = Math.round((doneCount / TASKS.length) * 100);

      // group by area
      const byArea = {};
      TASKS.forEach(t => { (byArea[t.area || "Other"] ||= []).push(t); });

      let html = `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <div class="big-num">${doneCount}/${TASKS.length}</div>
            <div class="muted">${pct}% done this shift</div>
          </div>
          <div class="progress-wrap" style="margin-top:10px">
            <div class="progress-bar" style="width:${pct}%"></div>
          </div>
        </div>`;

      for (const area in byArea) {
        html += `<h2 class="section">${area}</h2><div class="card">`;
        byArea[area].forEach(t => {
          const done = DONE.has(t.id);
          html += `
            <label class="row ${done ? "done" : ""}">
              <input type="checkbox" ${done ? "checked" : ""} onchange="toggle(${t.id}, this.checked)">
              <div class="txt">${t.text}</div>
            </label>`;
        });
        html += `</div>`;
      }
      app.innerHTML = html;
    }

    async function toggle(taskId, checked) {
      if (checked) {
        DONE.add(taskId);
        const { data: { user } } = await sb.auth.getUser();
        await sb.from("task_completions")
          .upsert({ task_id: taskId, period_key: PKEY, completed_by: user.id },
                  { onConflict: "task_id,period_key" });
      } else {
        DONE.delete(taskId);
        await sb.from("task_completions")
          .delete()
          .eq("task_id", taskId)
          .eq("period_key", PKEY);
      }
      render();
    }
  </script>
</body>
</html>
