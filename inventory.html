<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Inventory</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B4F3A">
</head>
<body>
  <div class="wrap" id="app"><div class="empty">Loading…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="nav.js"></script>
  <script>
    let ITEMS = [], FILTER = "all", IS_ADMIN = false;

    (async () => {
      if (!(await requireLogin())) return;
      const prof = await getMyProfile();
      IS_ADMIN = prof && prof.role === "admin";
      await renderTopbar("Inventory", prof);
      renderNav("inventory", IS_ADMIN);
      await load();
    })();

    async function load() {
      // admins read the meta view (includes updated_by_name); staff read the plain table
      const source = IS_ADMIN ? "v_inventory_meta" : "inventory_items";
      const { data } = await sb.from(source)
        .select("*").order("owner").order("category").order("name");
      ITEMS = data || [];
      render();
    }
    function isBelow(it) {
      return it.current_on_hand != null && it.threshold != null
             && Number(it.current_on_hand) < Number(it.threshold);
    }

    function render() {
      const app = document.getElementById("app");
      let list = ITEMS.slice();
      if (FILTER === "below") list = list.filter(isBelow);
      else if (FILTER === "extra") list = list.filter(i => i.order_extra);
      else if (FILTER === "tocount") list = list.filter(i => !i.counted_this_week);

      const belowN = ITEMS.filter(isBelow).length;
      const extraN = ITEMS.filter(i => i.order_extra).length;
      const toCount = ITEMS.filter(i => !i.counted_this_week).length;

      let html = `<div class="card"><div style="display:flex;gap:8px;flex-wrap:wrap">
        ${fb("all","All ("+ITEMS.length+")")}
        ${fb("below","Below ("+belowN+")")}
        ${fb("extra","Order Extra ("+extraN+")")}
        ${fb("tocount","To Count ("+toCount+")")}
      </div></div>`;

      // Admin: add a new inventory item
      if (IS_ADMIN) {
        html += `<div class="card">
          <div class="field" style="margin-bottom:8px"><label>Add inventory item</label>
            <input type="text" id="niName" placeholder="Item name"></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <select id="niOwner" style="font-size:15px;padding:9px;border-radius:8px;border:1px solid var(--line)">
              <option value="baker">Baker</option><option value="barista">Barista</option>
              <option value="cleaning">Cleaning</option><option value="shared">Shared</option>
            </select>
            <input type="text" id="niCat" placeholder="Category" style="width:120px">
            <input type="text" id="niUnit" placeholder="Unit" style="width:90px">
            <input type="number" id="niThresh" placeholder="Threshold" style="width:100px">
            <button class="mini" onclick="addItem()">Add item</button>
          </div>
          <div class="error" id="niErr" style="min-height:auto"></div>
        </div>`;
      }

      // group by CATEGORY only (no owner name in the header)
      let lastGroup = "", open = false;
      list.forEach(it => {
        const g = it.category || "Other";
        if (g !== lastGroup) { if (open) html += `</div>`; html += `<h2 class="section">${g}</h2><div class="card">`; lastGroup=g; open=true; }
        const below = isBelow(it);
        let fresh = "";
        if (IS_ADMIN && it.updated_at) {
          const who = it.updated_by_name ? "by "+it.updated_by_name : "";
          const when = new Date(it.updated_at).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
          fresh = `<div class="freshness">Last counted ${who} · ${when}</div>`;
        }
        html += `<div class="row ${below?"below-row":""}">
          <div class="txt">
            <div style="font-size:15px">${it.name}
              ${below?'<span class="pill below">BELOW</span>':''}
              ${it.order_extra?'<span class="pill extra">EXTRA</span>':''}</div>
            <div class="sub">min ${it.min_on_hand??"—"} · threshold ${it.threshold??"—"}${it.unit?" · "+it.unit:""}${IS_ADMIN&&it.unit_cost!=null?` · $${it.unit_cost}/unit`:""}</div>
            <div style="margin-top:4px">
              <button class="tbtn extra ${it.order_extra?"on":""}" onclick="setExtra(${it.id}, ${!it.order_extra})">
                <span class="dot">${it.order_extra?"●":"○"}</span> Order extra</button>
              <button class="tbtn counted ${it.counted_this_week?"on":""}" onclick="setCounted(${it.id}, ${!it.counted_this_week})">
                <span class="dot">${it.counted_this_week?"✓":"○"}</span> Counted</button>
              ${IS_ADMIN?`<span class="tbtn" style="cursor:default;background:#f2ede4">$ <input type="number" step="0.01" value="${it.unit_cost??""}" placeholder="cost"
                  style="width:64px;border:none;background:transparent;font-size:13px;font-weight:700;padding:0 2px" onchange="setCost(${it.id},this.value)"></span>`:""}
            </div>
            ${fresh}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <input type="number" class="count-num" value="${it.current_on_hand??""}" placeholder="qty" onchange="setCount(${it.id},this.value)">
            ${IS_ADMIN?`<button class="mini" style="background:var(--red);padding:4px 9px;font-size:12px" onclick="delItem(${it.id})">✕ remove</button>`:""}
          </div>
        </div>`;
      });
      if (open) html += `</div>`;
      if (!list.length) html += `<div class="empty">Nothing here.</div>`;
      app.innerHTML = html;
    }
    function fb(id,label){ return `<button class="${FILTER===id?"":"secondary"}" onclick="FILTER='${id}';render()">${label}</button>`; }

    async function setCount(id,val){
      const num = val===""?null:Number(val);
      const it=ITEMS.find(i=>i.id===id); it.current_on_hand=num;
      const { data:{user} } = await sb.auth.getUser();
      it.updated_at=new Date().toISOString();
      await sb.from("inventory_items").update({current_on_hand:num,updated_at:it.updated_at,updated_by:user.id}).eq("id",id);
      // refresh so admin freshness + below badges update
      await load();
    }
    async function setExtra(id,on){ const it=ITEMS.find(i=>i.id===id); it.order_extra=on; await sb.from("inventory_items").update({order_extra:on}).eq("id",id); render(); }
    async function setCounted(id,on){ const it=ITEMS.find(i=>i.id===id); it.counted_this_week=on; await sb.from("inventory_items").update({counted_this_week:on}).eq("id",id); render(); }
    async function setCost(id,val){ const n=val===""?null:Number(val); ITEMS.find(i=>i.id===id).unit_cost=n; await sb.from("inventory_items").update({unit_cost:n}).eq("id",id); }

    async function addItem(){
      const err=document.getElementById("niErr"); err.textContent="";
      const name=document.getElementById("niName").value.trim();
      const owner=document.getElementById("niOwner").value;
      const category=document.getElementById("niCat").value.trim()||null;
      const unit=document.getElementById("niUnit").value.trim()||null;
      const tv=document.getElementById("niThresh").value;
      const threshold=tv===""?null:Number(tv);
      if(!name){ err.textContent="Enter an item name."; return; }
      const { error }=await sb.from("inventory_items").insert({name,owner,category,unit,threshold,order_extra:false,counted_this_week:false});
      if(error){ err.textContent=error.message; return; }
      await load();
    }
    async function delItem(id){
      const it=ITEMS.find(i=>i.id===id);
      if(!confirm(`Remove "${it?.name||"this item"}" from inventory?`)) return;
      await sb.from("inventory_items").delete().eq("id",id);
      await load();
    }
  </script>
</body>
</html>
