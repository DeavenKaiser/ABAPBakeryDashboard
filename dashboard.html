<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B4F3A">
</head>
<body>
  <div class="wrap" id="app"><div class="empty">Loading…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="config.js"></script>
  <script src="nav.js"></script>
  <script>
    let PROF = null, IS_ADMIN = false, OWNER = null;

    (async () => {
      if (!(await requireLogin())) return;
      PROF = await getMyProfile();
      IS_ADMIN = PROF && PROF.role === "admin";
      const name = (PROF?.full_name || "").toLowerCase();
      if (name.includes("sierra")) OWNER = "sierra";
      else if (name.includes("mackenzie") || name.includes("kenzie")) OWNER = "mackenzie";
      else if (name.includes("marilyn")) OWNER = "marilyn";
      await renderTopbar("Dashboard", PROF);
      renderNav("dashboard", IS_ADMIN);
      await load();
    })();

    function isBelow(it) {
      return it.current_on_hand != null && it.threshold != null
             && Number(it.current_on_hand) < Number(it.threshold);
    }

    async function completionsFor(tasks) {
      const done = new Set();
      for (const f of ["each_shift","daily","weekly","monthly"]) {
        const ids = tasks.filter(t => t.frequency === f).map(t => t.id);
        if (!ids.length) continue;
        const { data } = await sb.from("task_completions")
          .select("task_id").eq("period_key", periodKey(f)).in("task_id", ids);
        (data || []).forEach(c => done.add(c.task_id));
      }
      return done;
    }

    function progressCard(title, done, total) {
      const pct = total ? Math.round(done/total*100) : 0;
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <strong>${title}</strong><span class="muted">${done}/${total} · ${pct}%</span>
        </div>
        <div class="progress-wrap" style="margin-top:8px"><div class="progress-bar" style="width:${pct}%"></div></div>
      </div>`;
    }

    async function load() {
      const app = document.getElementById("app");
      let html = "";

      // ----- Shift handoff note (read-only banner, everyone) -----
      const { data: note } = await sb.from("shift_note").select("body").eq("id",1).single();
      if (note && note.body && note.body.trim()) {
        html += `<div class="handoff-banner"><span class="lbl">Shift note</span><br>${note.body.replace(/</g,"&lt;")}</div>`;
      }

      // ----- Shared shift progress (everyone sees this) -----
      const { data: shiftTasks } = await sb.from("tasks")
        .select("*").eq("owner","shared").eq("frequency","each_shift").eq("active",true);
      const shiftDone = await completionsFor(shiftTasks || []);
      const sDone = (shiftTasks||[]).filter(t => shiftDone.has(t.id)).length;

      // ----- This person's own tasks (everyone sees their own) -----
      let ownBlock = "";
      if (OWNER) {
        const { data: myTasks } = await sb.from("tasks")
          .select("*").eq("owner",OWNER).eq("active",true);
        const myDone = await completionsFor(myTasks || []);
        const mDone = (myTasks||[]).filter(t => myDone.has(t.id)).length;
        ownBlock = progressCard("My tasks", mDone, (myTasks||[]).length);
      }

      html += `<div class="grid2">
        ${progressCard("Full shift (shared)", sDone, (shiftTasks||[]).length)}
        ${ownBlock}
      </div>`;

      // ================= STAFF STOP HERE (no money/stats) =================
      if (!IS_ADMIN) {
        document.getElementById("app").innerHTML = html;
        return;
      }

      // ================= ADMIN: financials, stats, order list =============
      const { data: items } = await sb.from("inventory_items").select("*");
      const { data: allTasks } = await sb.from("tasks").select("*").eq("active",true);
      const allDone = await completionsFor(allTasks || []);

      // Per-employee (role) DAILY tasks — collapsible, each with a progress bar
      html += `<h2 class="section">Daily tasks by employee</h2>`;
      const dailyFreqs = ["each_shift","daily"];
      [["baker","Baker"],["barista","Barista"],["cleaning","Cleaning"],["shared","Shared shift"]].forEach(([o,label]) => {
        const ts = (allTasks||[]).filter(t => t.owner===o && dailyFreqs.includes(t.frequency));
        if (!ts.length) return;
        const d = ts.filter(t => allDone.has(t.id)).length;
        const pct = Math.round(d/ts.length*100);
        const rowsHtml = ts.map(t =>
          `<div class="row ${allDone.has(t.id)?"done":""}" style="padding:8px 4px">
             <span style="width:18px">${allDone.has(t.id)?"✓":"○"}</span>
             <div class="txt" style="font-size:14px">${t.text}${t.area?` <span class="muted">· ${t.area}</span>`:""}</div>
           </div>`).join("");
        html += `<div class="card" style="padding:0;overflow:hidden">
          <div onclick="toggleGroup('${o}')" style="cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:10px">
            <span id="caret-${o}" style="transition:transform .15s;font-size:12px;color:var(--brown)">▶</span>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:600">
                <span>${label}</span><span class="muted">${d}/${ts.length} · ${pct}%</span>
              </div>
              <div class="progress-wrap" style="margin-top:6px"><div class="progress-bar" style="width:${pct}%"></div></div>
            </div>
          </div>
          <div id="group-${o}" style="display:none;padding:0 16px 12px 44px">${rowsHtml}</div>
        </div>`;
      });

      // inventory health + value
      const below = (items||[]).filter(isBelow);
      const extra = (items||[]).filter(i => i.order_extra);
      const inStock = (items||[]).length - below.length;
      const stockValue = (items||[]).reduce((s,i)=>
        s + ((i.unit_cost!=null && i.current_on_hand!=null) ? i.unit_cost*i.current_on_hand : 0), 0);

      html += `<h2 class="section">Inventory health</h2>
        <div class="grid2">
          <div class="card"><canvas id="invChart" height="170"></canvas></div>
          <div class="card">
            <div class="muted">Current stock value</div>
            <div class="big-num">$${stockValue.toFixed(2)}</div>
            <div class="muted" style="margin-top:8px">${below.length} below threshold · ${extra.length} order extra</div>
            <a href="reports.html"><button class="mini" style="margin-top:10px">View reports →</button></a>
          </div>
        </div>`;

      // Items to order — with Ordered button (admin task)
      // Pull both 'open' (grayed, awaiting delivery) and 'needs_reorder'
      // (was counted but still below → un-gray + notice).
      const { data: activeOrders } = await sb.from("order_log")
        .select("*").in("status", ["open","needs_reorder"]);
      const orderByItem = {};
      (activeOrders||[]).forEach(o => orderByItem[o.item_id] = o);
      const toOrder = [...new Set([...below, ...extra])];

      html += `<h2 class="section">Items to order (${toOrder.length})</h2><div class="card" id="orderCard">`;
      if (!toOrder.length) html += `<div class="empty">Nothing to order right now.</div>`;
      toOrder.forEach(it => {
        const ord = orderByItem[it.id];
        const isOpen = ord && ord.status === "open";              // grayed, awaiting delivery
        const needsReorder = ord && ord.status === "needs_reorder"; // un-gray + notice
        const dateStr = ord ? new Date(ord.ordered_at).toLocaleDateString(undefined,{month:"short",day:"numeric"}) : "";
        html += `<div class="row order-row ${isOpen?"ordered":""}" id="ord-${it.id}">
          <div class="txt">${it.name}
            <div class="sub">${it.owner} · ${isBelow(it)?"Below threshold":"Order extra"}${it.reorder_note?" · "+it.reorder_note:""}</div>
            ${isOpen?`<div class="order-date">Ordered ${dateStr} — awaiting delivery</div>`:""}
            ${needsReorder?`<div class="order-date" style="color:var(--red)">⚠ Counted but still below — needs reordering</div>`:""}
          </div>
          ${isOpen
            ? `<button class="secondary mini" onclick="unorder(${it.id})">Undo</button>`
            : `<button class="mini" onclick="markOrdered(${it.id})">Ordered</button>`}
        </div>`;
      });
      html += `</div>`;

      app.innerHTML = html;

      new Chart(document.getElementById("invChart"), {
        type:"doughnut",
        data:{ labels:["In stock","Below","Order extra"],
          datasets:[{ data:[inStock, below.length, extra.length],
            backgroundColor:["#4A7C4E","#B23A2E","#D8C3A5"] }] },
        options:{ plugins:{ legend:{ position:"bottom" } } }
      });
    }

    function toggleGroup(o) {
      const g = document.getElementById("group-"+o);
      const c = document.getElementById("caret-"+o);
      const open = g.style.display !== "none";
      g.style.display = open ? "none" : "block";
      if (c) c.style.transform = open ? "rotate(0deg)" : "rotate(90deg)";
    }

    async function markOrdered(itemId) {
      const { data: { user } } = await sb.auth.getUser();
      // clear any prior needs_reorder/open row for this item, then open a fresh order
      await sb.from("order_log").delete().eq("item_id", itemId).in("status", ["open","needs_reorder"]);
      await sb.from("order_log").insert({ item_id: itemId, ordered_by: user.id });
      await load();
    }
    async function unorder(itemId) {
      // remove the open order (undo an accidental mark)
      await sb.from("order_log").delete().eq("item_id", itemId).in("status", ["open","needs_reorder"]);
      await load();
    }
  </script>
</body>
</html>
