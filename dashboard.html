<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css?v=1784837094">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B4F3A">
</head>
<body class="dash">
  <div class="wrap" id="app"><div class="empty">Loading your day…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=1784837094"></script>
  <script src="nav.js?v=1784837094"></script>
  <script>
    // ---------- state ----------
    let PROF=null, IS_ADMIN=false, MY_ROLE=null, DATA={};

    (async () => {
      if (!(await requireLogin())) return;
      PROF = await getMyProfile();
      IS_ADMIN = PROF && PROF.role === "admin";
      MY_ROLE = profileJobRole(PROF);
      await renderTopbar("Dashboard", PROF);
      renderNav("dashboard", IS_ADMIN);
      await loadData();
      renderDash();
    })();
// ---------- one-time data load ----------
    async function loadData() {
      const [{data:items},{data:tasks}] = await Promise.all([
        sb.from("inventory_items").select("*"),
        sb.from("tasks").select("*").eq("active",true),
      ]);
      DATA.items = items||[]; DATA.tasks = tasks||[];

      // completions for current periods
      const done = new Set();
      await Promise.all(["each_shift","daily","weekly","monthly"].map(async f=>{
        const ids = DATA.tasks.filter(t=>t.frequency===f).map(t=>t.id);
        if(!ids.length) return;
        const { data } = await sb.from("task_completions").select("task_id").eq("period_key",periodKey(f)).in("task_id",ids);
        (data||[]).forEach(c=>done.add(c.task_id));
      }));
      DATA.done = done;

      // open orders
      const { data: orders } = await sb.from("order_log").select("*").in("status",["open","needs_reorder"]);
      DATA.orders = {}; (orders||[]).forEach(o=>DATA.orders[o.item_id]=o);

      // shift note
      const { data: note } = await sb.from("shift_note").select("body").eq("id",1).maybeSingle();
      DATA.note = note ? note.body : "";
    }

    // ---------- helpers for widgets ----------
    function roleTasks(role){ return DATA.tasks.filter(t=>t.owner===role); }
    function pctDone(list){ if(!list.length) return 0; return Math.round(list.filter(t=>DATA.done.has(t.id)).length/list.length*100); }
    function greeting(){
      const h=new Date().getHours();
      if(h<11) return "Good morning";
      if(h<16) return "Good afternoon";
      return "Good evening";
    }
    // Daily uplifting quote — fetched from a free API, cached for the day,
    // with a warm local fallback if the network/API is unavailable.
    const FALLBACK_LINES = [
      "Fresh start — let's make it a good one.",
      "Small batches, big heart.",
      "Every loaf tells a story.",
      "Good things take time to rise.",
      "Warm ovens, warm welcomes.",
      "The secret ingredient is always care.",
      "Rise, shine, repeat.",
    ];
    function fallbackLine(){ return FALLBACK_LINES[new Date().getDate() % FALLBACK_LINES.length]; }

    async function dailyQuote(){
      const today = new Date().toISOString().slice(0,10);
      try {
        const cached = JSON.parse(localStorage.getItem("dailyQuote")||"null");
        if (cached && cached.date === today) return cached.text;
      } catch(e){}
      try {
        const res = await fetch("https://zenquotes.io/api/today");
        if (res.ok) {
          const j = await res.json();
          if (j && j[0] && j[0].q) {
            const text = `${j[0].q} — ${j[0].a}`;
            try { localStorage.setItem("dailyQuote", JSON.stringify({date:today, text})); } catch(e){}
            return text;
          }
        }
      } catch(e){ /* offline or blocked — use fallback */ }
      return fallbackLine();
    }

    // SVG progress ring
    function ring(pct, size=64, stroke=8, color="#fff", track="rgba(255,255,255,.25)"){
      const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-pct/100);
      return `<svg width="${size}" height="${size}" class="hero-ring" viewBox="0 0 ${size} ${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
          stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
          transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .6s ease"/>
        <text x="50%" y="50%" text-anchor="middle" dy=".35em" class="ring-num">${pct}%</text>
      </svg>`;
    }

    // ===================================================================
    // WIDGET DEFINITIONS — each returns {title, body} html
    // ===================================================================
    const WIDGETS = {
      my_progress: () => {
        const mine = MY_ROLE ? roleTasks(MY_ROLE) : [];
        const p = pctDone(mine);
        const doneN = mine.filter(t=>DATA.done.has(t.id)).length;
        return { title:"My tasks today", body:`
          <div class="stat-row"><div class="stat-big">${doneN}/${mine.length}</div><div class="stat-label">${p}% done</div></div>
          <div class="progress-wrap" style="margin-top:10px"><div class="progress-bar" style="width:${p}%"></div></div>
          <a href="mytasks.html"><button class="mini" style="margin-top:12px">Go to my tasks →</button></a>` };
      },
      shift_progress: () => {
        const shift = DATA.tasks.filter(t=>t.owner==="shared" && t.frequency==="each_shift");
        const p = pctDone(shift);
        const doneN = shift.filter(t=>DATA.done.has(t.id)).length;
        return { title:"Shared shift tasks", body:`
          <div class="stat-row"><div class="stat-big">${doneN}/${shift.length}</div><div class="stat-label">${p}% this shift</div></div>
          <div class="progress-wrap" style="margin-top:10px"><div class="progress-bar" style="width:${p}%"></div></div>
          ${p===100?`<div style="margin-top:10px;color:var(--sage);font-weight:700">All shift tasks done — nice work!</div>`:""}` };
      },
      handoff: () => ({ title:"Shift note", body:
        DATA.note && DATA.note.trim()
          ? `<div style="font-size:15px;line-height:1.4;white-space:pre-wrap">${DATA.note.replace(/</g,"&lt;")}</div>
             <a href="mytasks.html"><button class="mini secondary" style="margin-top:10px">Edit note</button></a>`
          : `<div class="empty" style="padding:12px">No note right now.<br><a href="mytasks.html">Leave one for the next shift →</a></div>` }),
      my_inventory: () => {
        if(!MY_ROLE) return { title:"My inventory", body:`<div class="empty" style="padding:12px">No job role assigned yet.</div>` };
        const mine = DATA.items.filter(i=>i.owner===MY_ROLE);
        const low = mine.filter(isBelow);
        const toCount = mine.filter(i=>!i.counted_this_week);
        return { title:"My inventory", body:`
          <div style="display:flex;gap:18px;flex-wrap:wrap">
            <div><div class="stat-big" style="font-size:30px">${low.length}</div><div class="stat-label">below threshold</div></div>
            <div><div class="stat-big" style="font-size:30px">${toCount.length}</div><div class="stat-label">left to count</div></div>
          </div>
          <a href="inventory.html"><button class="mini" style="margin-top:12px">Open inventory →</button></a>` };
      },
      countdown: () => {
        // Countdown to inventory day(s). Staff: their own. Admin: all roles that have one.
        const dayName = d => ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d];
        function line(role){
          const dow = ROLE_DUE_DOW[role];
          if (dow == null) return "";
          const { days } = taskDue(role, "weekly");
          const who = roleLabel(role);
          const txt = days<=0 ? "today!" : `${days} day${days===1?"":"s"} — ${dayName(dow)}`;
          const color = days<=1 ? "var(--berry)" : "var(--crust)";
          return `<div class="mini-item">
            <span style="font-weight:600">${who} inventory</span>
            <span style="margin-left:auto;color:${color};font-weight:800">${txt}</span></div>`;
        }
        let body;
        if (IS_ADMIN) {
          body = ["baker","barista"].map(line).join("") || `<div class="empty">No inventory days set.</div>`;
        } else if (MY_ROLE && ROLE_DUE_DOW[MY_ROLE] != null) {
          const { days } = taskDue(MY_ROLE, "weekly");
          const dow = ROLE_DUE_DOW[MY_ROLE];
          body = `<div class="stat-row"><div class="stat-big" style="font-size:38px">${days<=0?"Today":days}</div>
            <div class="stat-label">${days<=0?"is your inventory day!":`day${days===1?"":"s"} until ${dayName(dow)} inventory`}</div></div>`;
        } else {
          body = `<div class="empty" style="padding:12px">No inventory day for your role.</div>`;
        }
        return { title:"Inventory day countdown", body };
      },
      // ---- admin widgets ----
      team_completion: () => {
        let rows="";
        [["baker","Baker"],["barista","Barista"],["cleaning","Cleaning"],["shared","Shared"]].forEach(([o,label])=>{
          const ts=roleTasks(o); if(!ts.length) return;
          const p=pctDone(ts), d=ts.filter(t=>DATA.done.has(t.id)).length;
          rows+=`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:14px"><span>${label}</span><span class="stat-label">${d}/${ts.length} · ${p}%</span></div>
            <div class="progress-wrap"><div class="progress-bar" style="width:${p}%"></div></div></div>`;
        });
        return { title:"Team completion", body: rows||`<div class="empty">No tasks.</div>` };
      },
      inventory_health: () => {
        const below=DATA.items.filter(isBelow), extra=DATA.items.filter(i=>i.order_extra);
        const inStock=DATA.items.length-below.length;
        return { title:"Inventory health", body:`
          <div class="ring-wrap" style="max-width:180px;margin:0 auto"><canvas id="healthPie" width="180" height="180" style="width:180px;height:180px"></canvas></div>
          <div style="display:flex;justify-content:center;gap:14px;margin-top:10px;flex-wrap:wrap;font-size:13px">
            <span class="clickable" onclick="location.href='inventory.html'"><span class="dot-tag" style="background:var(--sage);display:inline-block"></span> In stock ${inStock}</span>
            <span class="clickable" onclick="location.href='inventory.html?filter=below'"><span class="dot-tag" style="background:var(--berry);display:inline-block"></span> Below ${below.length}</span>
            <span class="clickable" onclick="location.href='inventory.html?filter=extra'"><span class="dot-tag" style="background:var(--honey);display:inline-block"></span> Order extra ${extra.length}</span>
          </div>
          <div class="stat-label" style="text-align:center;margin-top:6px">Tap a slice or label to jump to those items</div>` };
      },
      stock_value: () => {
        const val=DATA.items.reduce((s,i)=>s+((i.unit_cost!=null&&i.current_on_hand!=null)?i.unit_cost*i.current_on_hand:0),0);
        return { title:" Stock value", body:`
          <div class="stat-big">$${val.toFixed(2)}</div><div class="stat-label">current inventory on hand</div>
          <a href="reports.html"><button class="mini" style="margin-top:12px">Full reports →</button></a>` };
      },
      to_order: () => {
        const below=DATA.items.filter(isBelow), extra=DATA.items.filter(i=>i.order_extra);
        const toOrder=[...new Set([...below,...extra])];
        const orderedN=toOrder.filter(it=>DATA.orders[it.id]&&DATA.orders[it.id].status==="open").length;
        const toGo=toOrder.length-orderedN;
        let body;
        if(!toOrder.length) body=`<div class="empty" style="padding:12px">Nothing to order — shelves look good.</div>`;
        else body=`
          <div class="stat-row"><div class="stat-big">${toGo}</div><div class="stat-label">still to order</div></div>
          <div class="stat-label" style="margin-top:4px">${toOrder.length} total · ${orderedN} already ordered</div>
          <a href="shopping.html"><button class="mini" style="margin-top:12px">Open shopping list →</button></a>`;
        return { title:"Shopping list", body };
      },
      predict: () => {
        return { title:"Likely to order soon", body:`<div id="predictBody"><div class="stat-label">Loading estimate…</div></div>` };
      },
    };

    // Which widgets each role sees by default
    const DEFAULT_LAYOUT = {
      staff: ["my_progress","countdown","shift_progress","handoff","my_inventory"],
      admin: ["team_completion","inventory_health","to_order","stock_value","predict","handoff"],
    };
    const ALL_FOR = {
      staff: ["my_progress","countdown","shift_progress","handoff","my_inventory"],
      admin: ["team_completion","inventory_health","to_order","stock_value","predict","handoff","shift_progress","countdown"],
    };

    function layoutKey(){ return `dashLayout_${IS_ADMIN?'admin':'staff'}_${PROF.id}`; }
    function getLayout(){
      try { const s=localStorage.getItem(layoutKey()); if(s) return JSON.parse(s); } catch(e){}
      return (IS_ADMIN?DEFAULT_LAYOUT.admin:DEFAULT_LAYOUT.staff).slice();
    }
    function saveLayout(arr){ try{ localStorage.setItem(layoutKey(), JSON.stringify(arr)); }catch(e){} }

    // ---------- render ----------
    function renderDash() {
      const app=document.getElementById("app");
      const mine = MY_ROLE ? roleTasks(MY_ROLE) : [];
      const focusPct = IS_ADMIN
        ? pctDone(DATA.tasks.filter(t=>t.owner==="shared"&&t.frequency==="each_shift"))
        : pctDone([...(MY_ROLE?mine:[]), ...DATA.tasks.filter(t=>t.owner==="shared"&&t.frequency==="each_shift")]);

      const firstName=(PROF.full_name||"there").split(" ")[0];
      let html = `<div class="hero">
        <div>
          <h1>${greeting()}, ${firstName}</h1>
          <div class="sub" id="quoteLine">${fallbackLine()}</div>
        </div>
        ${ring(focusPct)}
      </div>`;

      // toolbar
      html += `<div class="dash-toolbar">
        <span class="stat-label">${IS_ADMIN?"Command center":"Today's focus"} · drag cards by the ⠿ handle to rearrange</span>
        <button class="tbtn" onclick="resetLayout()"><span class="dot">↺</span> Reset layout</button>
      </div>`;

      // tray of hidden widgets
      const layout=getLayout();
      const all=(IS_ADMIN?ALL_FOR.admin:ALL_FOR.staff);
      const hidden=all.filter(w=>!layout.includes(w));
      if(hidden.length){
        html+=`<div class="tray"><span class="stat-label">Add a card:</span> `+
          hidden.map(w=>`<span class="tray-chip" onclick="addWidget('${w}')">+ ${WIDGETS[w]().title}</span>`).join("")+`</div>`;
      }

      // grid
      html += `<div class="grid-dash" id="grid">`;
      layout.forEach(w=>{
        if(!WIDGETS[w]) return;
        const {title,body}=WIDGETS[w]();
        html += `<div class="wcard" draggable="false" data-w="${w}">
          <h3>${title}
            <span class="grip" title="Drag to move" onpointerdown="startDrag(event,'${w}')">⠿</span>
            <button class="wremove" title="Remove card" onclick="removeWidget('${w}')"></button>
          </h3>
          <div class="wbody">${body}</div>
        </div>`;
      });
      html += `</div>`;
      app.innerHTML = html;

      // post-render: charts + async widgets
      if(layout.includes("inventory_health")) drawHealthPie();
      if(layout.includes("predict")) loadPredict();
      // async: swap in the daily quote once it arrives
      dailyQuote().then(q => { const el=document.getElementById("quoteLine"); if(el&&q) el.textContent=q; });
    }

    // ---------- charts ----------
    let pieChart=null;
    function drawHealthPie(){
      const below=DATA.items.filter(isBelow), extra=DATA.items.filter(i=>i.order_extra);
      const inStock=DATA.items.length-below.length;
      const el=document.getElementById("healthPie"); if(!el) return;
      // lazy-load chart.js
      loadChartJs().then(()=>{
        if(pieChart) pieChart.destroy();
        pieChart=new Chart(el,{type:"doughnut",
          data:{labels:["In stock","Below","Order extra"],datasets:[{data:[inStock,below.length,extra.length],
            backgroundColor:["#7F9B6E","#C15B4A","#E0A43B"],borderWidth:2,borderColor:"#fff"}]},
          options:{cutout:"62%",plugins:{legend:{display:false}},
            onClick:(e,els)=>{ if(!els.length) return;
              const i=els[0].index;
              if(i===1) location.href="inventory.html?filter=below";
              else if(i===2) location.href="inventory.html?filter=extra";
              else location.href="inventory.html";
            }}});
      });
    }
    function loadChartJs(){
      return new Promise(res=>{
        if(window.Chart) return res();
        const s=document.createElement("script");
        s.src="https://cdn.jsdelivr.net/npm/chart.js@4"; s.onload=res; document.head.appendChild(s);
      });
    }
    async function loadPredict(){
      const el=document.getElementById("predictBody"); if(!el) return;
      const { data:proj } = await sb.from("v_order_projection").select("*");
      const below=DATA.items.filter(isBelow), extra=DATA.items.filter(i=>i.order_extra);
      const already=new Set([...below,...extra].map(i=>i.id));
      const soon=(proj||[]).filter(p=>p.days_to_threshold!=null&&p.days_to_threshold>=0&&p.days_to_threshold<=7&&!already.has(p.id))
        .sort((a,b)=>a.days_to_threshold-b.days_to_threshold).slice(0,5);
      if(!soon.length){ el.innerHTML=`<div class="empty" style="padding:8px">Nothing projected to run low this week.<br><span class="stat-label">Gets smarter as counts build up.</span></div>`; return; }
      el.innerHTML = soon.map(p=>`<div class="mini-item">
        <span class="dot-tag" style="background:var(--honey)"></span>${p.name}
        <span class="stat-label" style="margin-left:auto">~${p.days_to_threshold}d</span></div>`).join("");
    }

    // ---------- widget management ----------
    function addWidget(w){ const l=getLayout(); if(!l.includes(w)){ l.push(w); saveLayout(l); renderDash(); } }
    function removeWidget(w){ const l=getLayout().filter(x=>x!==w); saveLayout(l); renderDash(); }
    function resetLayout(){ localStorage.removeItem(layoutKey()); renderDash(); }

    // ---------- drag & drop (pointer-based, works touch + mouse) ----------
    let dragW=null, dragEl=null;
    function startDrag(e, w){
      e.preventDefault();
      window.__dragging = true;
      dragW=w; dragEl=e.target.closest(".wcard"); dragEl.classList.add("dragging");
      document.addEventListener("pointermove", onDragMove);
      document.addEventListener("pointerup", endDrag, {once:true});
    }
    function onDragMove(e){
      const grid=document.getElementById("grid"); if(!grid||!dragEl) return;
      const cards=[...grid.querySelectorAll(".wcard:not(.dragging)")];
      let target=null;
      for(const c of cards){
        const r=c.getBoundingClientRect();
        if(e.clientY < r.top + r.height/2 && e.clientX < r.right){ target=c; break; }
      }
      cards.forEach(c=>c.classList.remove("drag-over"));
      if(target){ target.classList.add("drag-over"); grid.insertBefore(dragEl, target); }
      else grid.appendChild(dragEl);
    }
    function endDrag(){
      document.removeEventListener("pointermove", onDragMove);
      if(dragEl) dragEl.classList.remove("dragging");
      window.__dragging = false;
      document.querySelectorAll(".drag-over").forEach(c=>c.classList.remove("drag-over"));
      // persist new order
      const order=[...document.querySelectorAll("#grid .wcard")].map(c=>c.dataset.w);
      saveLayout(order);
      dragW=null; dragEl=null;
    }

    // ---------- fast order actions (update locally, no full reload) ----------
    async function orderItem(itemId){
      const { data:{user} } = await sb.auth.getUser();
      // optimistic: update local state + just this widget immediately
      DATA.orders[itemId] = { item_id:itemId, status:"open", ordered_at:new Date().toISOString(), ordered_by:user.id };
      refreshWidget("to_order");
      // fire db writes in background
      await sb.from("order_log").delete().eq("item_id",itemId).in("status",["open","needs_reorder"]);
      await sb.from("order_log").insert({ item_id:itemId, ordered_by:user.id });
    }
    async function unorderItem(itemId){
      delete DATA.orders[itemId];
      refreshWidget("to_order");
      await sb.from("order_log").delete().eq("item_id",itemId).in("status",["open","needs_reorder"]);
    }
    // Re-render just one widget's body in place (keeps scroll + feels instant)
    function refreshWidget(w){
      const card=document.querySelector(`.wcard[data-w="${w}"] .wbody`);
      if(!card||!WIDGETS[w]) return;
      card.innerHTML = WIDGETS[w]().body;
      if(w==="inventory_health") drawHealthPie();
    }
  </script>
</body>
</html>
