<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ABAP Bakery — Sign In</title>
  <link rel="stylesheet" href="style.css?v=1784909995">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B4F3A">
</head>
<body>
  <div class="wrap">
    <div class="card login-box">
      <h1>ABAP Bakery</h1>
      <p class="muted center">Team Operations</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <div class="error" id="err"></div>
      <button id="loginBtn" style="width:100%">Sign In</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=1784909995"></script>
  <script>
    // If already signed in, skip straight to the app.
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = "dashboard.html";
    })();

    const err = document.getElementById("err");
    // Friendly note if we arrived here from an inactivity timeout
    if (new URLSearchParams(location.search).get("timeout") === "1") {
      err.textContent = "You were signed out after 30 minutes of inactivity. Please sign in again.";
      err.style.color = "#6B4F3A";
    }
    document.getElementById("loginBtn").addEventListener("click", doLogin);
    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      err.textContent = "";
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) { err.textContent = "Enter your email and password."; return; }
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { err.textContent = error.message; return; }
      // Force password change if admin flagged it.
      const prof = await getMyProfile();
      if (prof && prof.must_change_password) { window.location.href = "change-password.html"; return; }
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
