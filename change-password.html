<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Set a New Password</title>
  <link rel="stylesheet" href="style.css?v=1784835352">
  <meta name="theme-color" content="#6B4F3A">
</head>
<body>
  <div class="wrap">
    <div class="card login-box">
      <h1>Set a New Password</h1>
      <p class="muted center">Please choose a new password to continue.</p>
      <div class="field"><label>New password</label><input type="password" id="p1"></div>
      <div class="field"><label>Confirm new password</label><input type="password" id="p2"></div>
      <p class="muted" style="font-size:12px">At least 8 characters, with 3 of these 4: lowercase, uppercase, number, symbol.</p>
      <div class="error" id="err"></div>
      <button id="saveBtn" style="width:100%">Save & Continue</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=1784835352"></script>
  <script>
    (async () => { if (!(await requireLogin())) return; })();
    const err = document.getElementById("err");
    document.getElementById("saveBtn").addEventListener("click", save);

    function complexOK(pw) {
      const cats = [/[a-z]/,/[A-Z]/,/[0-9]/,/[^A-Za-z0-9]/].filter(re=>re.test(pw)).length;
      return pw.length >= 8 && cats >= 3;
    }
    async function save() {
      err.textContent = "";
      const p1 = document.getElementById("p1").value, p2 = document.getElementById("p2").value;
      if (p1 !== p2) { err.textContent = "The two passwords don't match."; return; }
      if (!complexOK(p1)) { err.textContent = "Password must be 8+ chars with 3 of 4: lowercase, uppercase, number, symbol."; return; }
      const { error } = await sb.auth.updateUser({ password: p1 });
      if (error) { err.textContent = error.message; return; }
      const { data: { user } } = await sb.auth.getUser();
      await sb.from("profiles").update({ must_change_password: false }).eq("id", user.id);
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
