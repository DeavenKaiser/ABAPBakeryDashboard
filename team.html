<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Manage Team</title>
  <link rel="stylesheet" href="style.css?v=1784835352">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B4F3A">
</head>
<body>
  <div class="wrap" id="app"><div class="empty">Loading…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=1784835352"></script>
  <script src="nav.js?v=1784835352"></script>
  <script>
    let IS_ADMIN=false;
    (async () => {
      try {
        console.log("[team] start");
        if (!(await requireLogin())) { console.log("[team] not logged in"); return; }
        console.log("[team] logged in, fetching profile…");
        const prof = await getMyProfile();
        console.log("[team] profile:", prof);
        IS_ADMIN = prof && prof.role==="admin";
        await renderTopbar("Manage Team", prof);
        renderNav("team", IS_ADMIN);
        if (!prof) {
          document.getElementById("app").innerHTML=`<div class="card"><div class="empty">
            Couldn't load your profile. Your login may not have a profile row yet.<br><br>
            Signed-in email is shown at the top — make sure that account exists in the
            <strong>profiles</strong> table.</div></div>`;
          return;
        }
        if (!IS_ADMIN) {
          document.getElementById("app").innerHTML=`<div class="card"><div class="empty">
            <strong>${prof.full_name || "This account"}</strong> is currently role
            "<strong>${prof.role}</strong>", not admin.<br><br>
            Run this in Supabase SQL editor:<br>
            <code style="font-size:12px">update profiles set role='admin' where full_name='${prof.full_name}';</code>
            <br><br>then reload.</div></div>`;
          return;
        }
        console.log("[team] admin confirmed, loading users…");
        await load();
      } catch (e) {
        console.error("[team] startup error:", e);
        document.getElementById("app").innerHTML=`<div class="card"><div class="error" style="min-height:auto">
          Something went wrong starting this page: ${e.message}<br><br>Open the browser console (F12) for details.</div></div>`;
      }
    })();

    // Calls the manage-users Edge Function with the caller's auth token.
    async function callFn(payload) {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return { error: "Not signed in." };
      try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 12000);
        const res = await fetch(`${SUPABASE_URL}/functions/v1/manageUsers`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${session.access_token}`,
            "apikey": SUPABASE_PUBLISHABLE_KEY
          },
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        clearTimeout(timer);
        if (!res.ok) {
          // Try to read an error body; fall back to status text
          let msg = `Server returned ${res.status}`;
          try { const j = await res.json(); if (j.error) msg = j.error; } catch (e) {}
          if (res.status === 404) msg = "The manage-users function isn't deployed yet. Run:  supabase functions deploy manage-users";
          return { error: msg };
        }
        return await res.json();
      } catch (e) {
        if (e.name === "AbortError") return { error: "Request timed out. Is the Edge Function deployed?" };
        return { error: "Couldn't reach the server: " + e.message };
      }
    }

    async function load() {
      const app = document.getElementById("app");
      const r = await callFn({ action: "list" });
      if (r.error) {
        app.innerHTML = `<div class="card">
          <h2 class="section" style="margin-top:0">Team management isn't ready yet</h2>
          <div class="error" style="min-height:auto">${r.error}</div>
          <p class="muted">This screen needs the <strong>manage-users</strong> Edge Function deployed to Supabase.
          From the project folder, run:</p>
          <div style="background:#f0ede8;border-left:3px solid var(--brown);padding:10px 12px;font-family:monospace;font-size:13px;border-radius:6px">
            supabase login<br>
            supabase link --project-ref hdyyffeameoxocwvirdl<br>
            supabase functions deploy manage-users
          </div>
          <p class="muted" style="margin-top:12px">Until then, you can still add users and set roles directly in the
          Supabase dashboard (Authentication → Users, then the SQL for roles).</p>
        </div>`;
        return;
      }
      const users = r.users || [];

      let html = `<h2 class="section">Add a team member</h2>
        <div class="card">
          <div class="field"><label>Full name</label>
            <input type="text" id="nName" placeholder="e.g. Sierra"></div>
          <div class="field"><label>Email</label><input type="email" id="nEmail" placeholder="sierra@abapbakery.com"></div>
          <div class="field"><label>Temporary password</label><input type="text" id="nPass" placeholder="at least 6 characters"></div>
          <div class="field"><label>Access role</label>
            <select id="nRole" style="font-size:16px;padding:10px;border-radius:8px;border:1px solid var(--line);width:100%">
              <option value="staff">Staff</option><option value="admin">Admin</option>
            </select></div>
          <div class="field"><label>Job (which task list they own)</label>
            <select id="nJob" style="font-size:16px;padding:10px;border-radius:8px;border:1px solid var(--line);width:100%">
              <option value="">— none —</option>
              <option value="baker">Baker</option>
              <option value="barista">Barista</option>
              <option value="cleaning">Cleaning</option>
            </select></div>
          <div class="error" id="addErr"></div>
          <button onclick="addUser()">Add member</button>
        </div>

        <h2 class="section">Current team (${users.length})</h2><div class="card">`;
      users.forEach(u => {
        html += `<div class="row">
          <div class="txt">${u.full_name} <span class="rolechip">${u.role}</span>
            <div class="sub">${u.email||""}</div>
            <div style="margin-top:5px">
              <label class="sub">Job:
              <select onchange="setJob('${u.id}',this.value)" style="font-size:12px;padding:4px;border-radius:6px;border:1px solid var(--line)">
                <option value="" ${!u.job_role?"selected":""}>— none —</option>
                <option value="baker" ${u.job_role==="baker"?"selected":""}>Baker</option>
                <option value="barista" ${u.job_role==="barista"?"selected":""}>Barista</option>
                <option value="cleaning" ${u.job_role==="cleaning"?"selected":""}>Cleaning</option>
              </select></label>
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-direction:column">
            <button class="secondary mini" onclick="toggleRole('${u.id}','${u.role}')">${u.role==="admin"?"Make staff":"Make admin"}</button>
            <button class="secondary mini" onclick="pwPrompt('${u.id}','${(u.full_name||"").replace(/'/g,"")}')">Set password</button>
            <button class="mini" style="background:var(--red)" onclick="delUser('${u.id}','${(u.full_name||"").replace(/'/g,"")}')">Remove</button>
          </div>
        </div>`;
      });
      html += `</div>`;
      app.innerHTML = html;
    }

    async function addUser() {
      const err = document.getElementById("addErr"); err.textContent="";
      const full_name=document.getElementById("nName").value.trim();
      const email=document.getElementById("nEmail").value.trim();
      const password=document.getElementById("nPass").value;
      const role=document.getElementById("nRole").value;
      const job_role=document.getElementById("nJob").value;
      if (!full_name||!email||!password){ err.textContent="Fill in name, email, and password."; return; }
      const r = await callFn({ action:"create", full_name, email, password, role, job_role });
      if (r.error){ err.textContent=r.error; return; }
      await load();
    }
    async function toggleRole(id, cur) {
      await callFn({ action:"set_role", id, role: cur==="admin"?"staff":"admin" });
      await load();
    }
    function pwPrompt(id, name) {
      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px";
      overlay.innerHTML = `<div class="card" style="max-width:360px;width:100%;margin:0">
        <h2 class="section" style="margin-top:0">Set password for ${name}</h2>
        <div class="field"><label>New password</label><input type="password" id="pw1"></div>
        <div class="field"><label>Confirm password</label><input type="password" id="pw2"></div>
        <p class="muted" style="font-size:12px">8+ chars, 3 of 4: lowercase, uppercase, number, symbol. They'll be asked to change it at next login.</p>
        <div class="error" id="pwErr" style="min-height:auto"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="secondary mini" id="pwCancel">Cancel</button>
          <button class="mini" id="pwSave">Set password</button>
        </div>
      </div>`;
      document.body.appendChild(overlay);
      overlay.querySelector("#pwCancel").onclick = () => overlay.remove();
      overlay.querySelector("#pwSave").onclick = async () => {
        const p1 = overlay.querySelector("#pw1").value, p2 = overlay.querySelector("#pw2").value;
        const e = overlay.querySelector("#pwErr");
        if (p1 !== p2) { e.textContent = "Passwords don't match."; return; }
        const cats = [/[a-z]/,/[A-Z]/,/[0-9]/,/[^A-Za-z0-9]/].filter(re=>re.test(p1)).length;
        if (p1.length < 8 || cats < 3) { e.textContent = "8+ chars and 3 of 4 categories required."; return; }
        const r = await callFn({ action: "set_password", id, password: p1 });
        if (r.error) { e.textContent = r.error; return; }
        overlay.remove();
      };
    }

    async function setJob(id, job_role) {
      await callFn({ action:"set_job", id, job_role });
      await load();
    }
    async function delUser(id, name) {
      if (!confirm(`Remove ${name}? This deletes their login for good.`)) return;
      const r = await callFn({ action:"delete", id });
      if (r.error){ alert(r.error); return; }
      await load();
    }
  </script>
</body>
</html>
